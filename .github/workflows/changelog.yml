name: Generate CHANGELOG

on:
  push:
    branches:
      - main

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate and push CHANGELOG
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            git log "$PREVIOUS_TAG..HEAD" --no-merges --pretty=format:"- %s (%h)" > CHANGELOG.md
          else
            git log --no-merges --pretty=format:"- %s (%h)" > CHANGELOG.md
          fi
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git diff --cached --quiet || {
            git commit -m "docs: update CHANGELOG"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}" HEAD:${{ github.ref_name }}
          }
